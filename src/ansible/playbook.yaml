---
- name: Deploy Health API
  hosts: vps
  become: true

  vars:
    image_name: "your_dockerhub_username/health-api:latest"
    container_name: "health-api"
    app_port: 8000

  tasks:
    - name: Install required packages
      apt:
        name:
          - docker.io
          - nginx
          - python3-pip
        state: present
        update_cache: true

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ image_name }}"
        source: pull
        force_source: true

    - name: Stop existing container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: true

    - name: Run Docker container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}"
        state: started
        restart_policy: always
        ports:
          - "{{ app_port }}:{{ app_port }}"

    - name: Configure Nginx reverse proxy
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/health-api
        mode: '0644'

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/health-api
        dest: /etc/nginx/sites-enabled/health-api
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
        enabled: true